<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valentin Vitvinskii</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <header class="site-header">
      <nav class="tabs" aria-label="Main sections">
        <button class="tab is-active mobile-copyright" data-tab="projects" type="button">VALENTIN VITVINSKII &copy; 2026</button>
        <button class="tab portrait-tab" data-tab="about" type="button">about</button>
        <button class="tab portrait-tab" data-tab="contact" type="button">contact</button>
      </nav>
    </header>

    <main class="tab-panels">
      <section class="panel is-active" data-panel="projects" aria-labelledby="projects-tab">
        <div class="head-stage" id="head-stage" aria-label="3D animated head"></div>
        <div class="head-meta" id="head-meta" aria-live="polite">
          <span class="head-meta-name" id="head-meta-name"></span>
          <span class="head-meta-tags" id="head-meta-tags"></span>
        </div>
        <div class="tiles-orbit" id="tiles-orbit" aria-label="Project cards in semicircle"></div>
      </section>

      <section class="panel" data-panel="index">
        <ul class="projects-list" id="projects-list"></ul>
      </section>

      <section class="panel" data-panel="about">
        <div class="mobile-info" id="mobile-about-content"></div>
      </section>

      <section class="panel" data-panel="contact">
        <div class="mobile-info" id="mobile-contact-content"></div>
      </section>

      <section class="panel detail-panel" data-panel="detail">
        <div class="detail-scroll">
          <div class="detail-blocks">
            <div class="detail-block">
              <p class="eyebrow" id="detail-index"></p>
              <h3 id="detail-title"></h3>
              <p id="detail-description"></p>
            </div>
            <div class="detail-block">
              <p id="detail-subtitle"></p>
            </div>
          </div>
          <div class="detail-media-wrap">
            <div class="detail-media" id="detail-media"></div>
            <div class="detail-video-controls" id="detail-video-controls" style="display:none">
              <button class="detail-video-btn" id="detail-video-play" type="button" aria-label="Play">
                <img id="detail-play-icon" src="./icons/music-play-play-button-svgrepo-com.svg" alt="" width="18" height="18">
                <img id="detail-pause-icon" src="./icons/media-player-music-pause-svgrepo-com.svg" alt="" width="18" height="18" style="display:none">
              </button>
              <button class="detail-video-btn" id="detail-video-fullscreen" type="button" aria-label="Fullscreen">
                <img src="./icons/fullscreen-svgrepo-com.svg" alt="" width="16" height="16">
              </button>
            </div>
          </div>
          <div class="detail-credits" id="detail-credits">
            <div class="credit-col"></div>
            <div class="credit-col"></div>
            <div class="credit-col"></div>
          </div>
        </div>
        <button class="detail-back" type="button" id="detail-back" aria-label="Back">back</button>
        <div class="detail-nav">
          <button class="detail-nav-btn" type="button" id="detail-prev" aria-label="Previous">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>prev</span>
          </button>
          <button class="detail-nav-btn" type="button" id="detail-next" aria-label="Next">
            <span>next</span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </section>
    </main>

    <div class="reveal-overlay" id="reveal-overlay">
      <img class="reveal-image" id="reveal-image" src="" alt="" />
    </div>

    <aside class="info-side-panel" id="info-side-panel" aria-label="Side info panel">
      <div class="side-panel-top"></div>
      <div class="side-panel-bottom"></div>
    </aside>

    <div class="view-switch" role="group" aria-label="Display mode">
      <button class="slider-toggle" type="button" id="view-toggle">
        <span class="slider-option" data-view="projects">overview</span>
        <span class="slider-option" data-view="index">index</span>
        <span class="slider-knob"></span>
      </button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
